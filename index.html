<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Anniversary</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #ffc0cb;
        --secondary: #fff8f0;
        --accent: #e0e0e0;
        --text: #4a4a4a;
        --text-light: #8a8a8a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(135deg, #fff8f0 0%, #ffe8e8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Floating hearts animation */
      .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        opacity: 0;
        animation: float 15s infinite ease-in-out;
      }

      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        width: 10px;
        height: 16px;
        background: rgba(255, 192, 203, 0.3);
        border-radius: 10px 10px 0 0;
      }

      .heart::before {
        left: 10px;
        transform: rotate(-45deg);
        transform-origin: 0 100%;
      }

      .heart::after {
        left: 0;
        transform: rotate(45deg);
        transform-origin: 100% 100%;
      }

      @keyframes float {
        0% {
          opacity: 0;
          transform: translateY(100vh) translateX(0) scale(0);
        }
        10% {
          opacity: 0.6;
        }
        50% {
          transform: translateY(-50vh) translateX(20px) scale(1);
        }
        90% {
          opacity: 0.6;
        }
        100% {
          opacity: 0;
          transform: translateY(-100vh) translateX(-20px) scale(0);
        }
      }

      .container {
        text-align: center;
        padding: 2rem;
        z-index: 10;
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 300;
        color: var(--text);
        margin-bottom: 1rem;
        letter-spacing: 2px;
      }

      .subtitle {
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        color: var(--text-light);
        margin-bottom: 3rem;
        font-weight: 300;
        letter-spacing: 1px;
      }

      .form-container {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 3rem 2rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        max-width: 400px;
        margin: 0 auto;
      }

      .input-group {
        margin-bottom: 2rem;
      }

      label {
        display: block;
        font-size: 0.9rem;
        color: var(--text-light);
        margin-bottom: 0.5rem;
        text-align: left;
        font-weight: 300;
        letter-spacing: 0.5px;
      }

      input[type="text"] {
        width: 100%;
        padding: 1rem 1.5rem;
        font-size: 1.1rem;
        border: 2px solid var(--accent);
        border-radius: 50px;
        background: white;
        color: var(--text);
        font-family: "Montserrat", sans-serif;
        transition: all 0.3s ease;
        text-align: center;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(255, 192, 203, 0.1);
      }

      input[type="text"]::placeholder {
        color: var(--text-light);
        opacity: 0.5;
      }

      button {
        width: 100%;
        padding: 1rem 2rem;
        font-size: 1rem;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--primary) 0%, #ffb5c5 100%);
        color: white;
        font-family: "Montserrat", sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 400;
        box-shadow: 0 5px 15px rgba(255, 192, 203, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 192, 203, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      .error-message {
        color: #ff6b6b;
        font-size: 0.9rem;
        margin-top: 1rem;
        opacity: 0;
        transition: opacity 0.3s ease;
        font-weight: 300;
      }

      .error-message.show {
        opacity: 1;
        animation: shake 0.5s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      @media (max-width: 768px) {
        .form-container {
          padding: 2rem 1.5rem;
        }

        h1 {
          margin-bottom: 0.5rem;
        }

        .subtitle {
          margin-bottom: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Floating hearts -->
    <div class="heart" style="left: 10%; animation-delay: 0s"></div>
    <div class="heart" style="left: 30%; animation-delay: 3s"></div>
    <div class="heart" style="left: 50%; animation-delay: 6s"></div>
    <div class="heart" style="left: 70%; animation-delay: 9s"></div>
    <div class="heart" style="left: 90%; animation-delay: 12s"></div>

    <div class="container">
      <h1>Our Anniversary</h1>
      <p class="subtitle">Enter our special date to continue</p>

      <div class="form-container">
        <form id="dateForm">
          <div class="input-group">
            <label for="dateInput">Anniversary Date</label>
            <input
              type="text"
              id="dateInput"
              placeholder="MM/DD/YYYY"
              maxlength="10"
              autocomplete="off"
            />
          </div>
          <button type="submit">Unlock Our Memories</button>
          <p class="error-message" id="errorMessage">
            Oops! That's not quite right. Try again ❤️
          </p>
        </form>
      </div>
    </div>

    <script>
      // Set your anniversary date here (MM/DD/YYYY format)
      const ANNIVERSARY_DATE = "05/24/2022"; // Change this to your actual date

      const form = document.getElementById("dateForm");
      const input = document.getElementById("dateInput");
      const errorMessage = document.getElementById("errorMessage");

      // Format input as MM/DD/YYYY
      input.addEventListener("input", function (e) {
        let value = e.target.value.replace(/\D/g, "");

        if (value.length >= 2) {
          value = value.substring(0, 2) + "/" + value.substring(2);
        }
        if (value.length >= 5) {
          value = value.substring(0, 5) + "/" + value.substring(5, 9);
        }

        e.target.value = value;
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const enteredDate = input.value.trim();

        if (enteredDate === ANNIVERSARY_DATE) {
          // Success! Redirect to homepage
          document.body.style.animation = "fadeOut 0.5s ease-out forwards";
          setTimeout(() => {
            window.location.href = "homepage.html";
          }, 500);
        } else {
          // Show error message
          errorMessage.classList.add("show");
          input.style.borderColor = "#FF6B6B";

          setTimeout(() => {
            errorMessage.classList.remove("show");
            input.style.borderColor = "";
          }, 3000);
        }
      });

      // Remove error styling on new input
      input.addEventListener("input", function () {
        input.style.borderColor = "";
      });
    </script>

    <style>
      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: scale(0.95);
        }
      }
    </style>
  </body>
</html>
